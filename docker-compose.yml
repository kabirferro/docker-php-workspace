services:
  mysql:
    image: mysql:8.0
    container_name: mysql80
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    command: --default-authentication-plugin=mysql_native_password --disable-log-bin --innodb-doublewrite=0
    volumes:
      - ./conf/mysql/my.cnf:/etc/mysql/conf.d/my_custom.cnf
      - ${DB_DIR}:/var/lib/mysql:delegated
      - ./src/init-database.sql:/docker-entrypoint-initdb.d/init-database.sql
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 4G
    networks:
      - dev-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pma
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${PMA_PORT}:80"
    networks:
      - dev-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - dev-network

  php74:
    build:
      context: ./src
      dockerfile: Dockerfile.php74
    container_name: php74
    restart: always
    volumes:
      - ${WEB_DIR}:/var/www/html
      - ./conf/php/php74.ini:/usr/local/etc/php/conf.d/custom.ini
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    networks:
      - dev-network

  php82:
    build:
      context: ./src
      dockerfile: Dockerfile.php82
    container_name: php82
    restart: always
    volumes:
      - ${WEB_DIR}:/var/www/html
      - ./conf/php/php82.ini:/usr/local/etc/php/conf.d/custom.ini
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    networks:
      - dev-network

  apache:
    build:
      context: ./src
      dockerfile: Dockerfile.apache
    container_name: apache
    restart: always
    ports:
      - "${APACHE_HTTP_PORT}:80"
      - "${APACHE_HTTPS_PORT}:443"
    volumes:
      - ${WEB_DIR}:/var/www/html
      - ${VHOSTS_DIR}:/usr/local/apache2/conf/extra/vhosts
      - ./src/generate-vhosts.sh:/usr/local/bin/generate-vhosts.sh
    depends_on:
      - mysql
      - php74
      - php82
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge      